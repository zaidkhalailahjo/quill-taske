<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quill System - Main Workspace</title>
    
    <link rel="manifest" href="manifest.json" id="dynamic-manifest">
    <meta name="theme-color" content="#002d74">
    <link id="dynamic-favicon" rel="icon" href="https://uploads.onecompiler.io/43n8uttmw/44k6d22hf/Screenshot_2025-06-20_213937-removebg-preview.png">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#002d74', secondary: '#00839b', light: '#f3f4f6', dark: '#1f2937' }, fontFamily: { sans: ['Cairo', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 h-screen overflow-hidden flex relative transition-colors duration-300">

    <div id="loadingScreen" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-primary dark:text-secondary font-bold text-lg">جاري إعداد بيئة العمل واسترجاع البيانات...</p>
    </div>

    <div id="systemPasswordScreen" class="fixed inset-0 bg-primary z-[45] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-6 md:p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <img src="https://quill.world/wp-content/uploads/2022/01/New-Project-9-1-1.png" class="h-12 md:h-16 mx-auto mb-6 object-contain block dark:hidden">
            <h2 class="text-xl md:text-2xl font-bold text-gray-800 dark:text-white mb-4">رمز الدخول للنظام</h2>
            <input type="password" id="sysPasswordInput" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-4 py-3 focus:outline-none focus:border-secondary mb-4 text-center" placeholder="اكتب كلمة السر">
            <button id="sysPasswordBtn" onclick="window.checkSystemPassword()" class="w-full bg-secondary hover:bg-primary text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-sm">متابعة</button>
            <p id="sysPassError" class="text-red-500 text-sm mt-3 hidden font-bold">رمز الدخول غير صحيح!</p>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-6 left-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/tasks.js"></script>
    <script type="module" src="js/chat.js"></script>
    <script type="module" src="js/crm.js"></script>
    </body>
</html>
