<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quill system</title>
    <link rel="manifest" href="manifest.json" id="dynamic-manifest">
    <meta name="theme-color" content="#002d74">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#002d74', secondary: '#00839b' }, fontFamily: { sans: ['Cairo', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 h-screen overflow-hidden flex relative transition-colors duration-300">

    <div id="loadingScreen" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-primary dark:text-secondary font-bold text-lg">جاري تحميل النظام...</p>
    </div>

    <div id="systemPasswordScreen" class="fixed inset-0 bg-primary z-[45] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-6 md:p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <img src="https://quill.world/wp-content/uploads/2022/01/New-Project-9-1-1.png" class="h-12 mx-auto mb-6 dark:hidden">
            <img src="https://quill.world/wp-content/uploads/2022/01/New-Project-10-1.png" class="h-12 mx-auto mb-6 hidden dark:block">
            <h2 class="text-xl font-bold mb-4">رمز الدخول للنظام</h2>
            <input type="password" id="sysPasswordInput" class="w-full border p-3 rounded-lg mb-4 text-center dark:bg-gray-700" placeholder="كلمة السر">
            <button onclick="window.checkSystemPassword()" class="w-full bg-secondary text-white py-3 rounded-lg font-bold shadow-sm">متابعة</button>
            <p id="sysPassError" class="text-red-500 text-sm mt-3 hidden">الرمز غير صحيح!</p>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 bg-primary z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-xl text-center shadow-2xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-8">مرحباً بك في نظام Quill</h2>
            <button id="googleLoginBtn" class="w-full flex items-center justify-center gap-3 bg-white border p-3 rounded-lg text-gray-700 font-bold hover:bg-gray-50 transition shadow-sm">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6"> تسجيل الدخول بجوجل
            </button>
        </div>
    </div>

    <div id="setupProfileScreen" class="fixed inset-0 bg-primary z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-6 text-center">إكمال الملف الشخصي</h2>
            <form id="setupProfileForm" class="space-y-4">
                <input type="text" id="setupName" required placeholder="الاسم الكامل" class="w-full border p-2 rounded dark:bg-gray-700">
                <select id="setupRole" required class="w-full border p-2 rounded dark:bg-gray-700">
                    <option value="" disabled selected>-- اختر وظيفتك --</option>
                    <option value="technical team supervisor">Technical Team Supervisor</option>
                    <option value="Technical Engineer">Technical Engineer</option>
                    <option value="accountant">Accountant</option>
                </select>
                <button type="submit" class="w-full bg-secondary text-white py-3 rounded-lg font-bold">حفظ والدخول</button>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-6 left-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/ui-logic.js"></script>
    <script type="module" src="js/auth-logic.js"></script>
    <script type="module" src="js/tasks-logic.js"></script>
    <script type="module" src="js/chat-logic.js"></script>
    <script type="module" src="js/crm-logic.js"></script>
    <script type="module" src="js/attendance-logic.js"></script>
    <script type="module" src="js/app-core.js"></script>

    <script>
        // كود طوارئ لإغلاق اللودر إذا فشل التحميل
        setTimeout(() => {
            const loader = document.getElementById('loadingScreen');
            if(loader) loader.classList.add('hidden');
        }, 5000);
    </script>
</body>
</html>
