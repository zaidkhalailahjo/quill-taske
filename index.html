<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quill System - Workspace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#002d74', secondary: '#00839b' }, fontFamily: { sans: ['Cairo', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 h-screen overflow-hidden flex relative">

    <div id="loadingScreen" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-primary font-bold">جاري التحميل...</p>
    </div>

    <div id="systemPasswordScreen" class="fixed inset-0 bg-primary z-[45] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <h2 class="text-2xl font-bold mb-4">رمز الدخول</h2>
            <input type="password" id="sysPasswordInput" class="w-full border p-3 rounded-lg mb-4 text-center dark:bg-gray-700" placeholder="كلمة السر">
            <button onclick="window.checkSystemPassword()" class="w-full bg-secondary text-white py-3 rounded-lg font-bold">دخول</button>
            <p id="sysPassError" class="text-red-500 mt-2 hidden">الرمز غير صحيح</p>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 bg-primary z-40 hidden flex items-center justify-center">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-xl text-center">
            <h2 class="text-xl font-bold mb-6">تسجيل الدخول للنظام</h2>
            <button id="googleLoginBtn" class="flex items-center gap-3 bg-white border p-3 rounded-lg text-gray-700 font-bold">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6">
                استخدام Google
            </button>
        </div>
    </div>

    <div id="pendingApprovalScreen" class="fixed inset-0 bg-primary z-[42] hidden flex items-center justify-center">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-xl text-center">
            <h2 class="font-bold">طلبك قيد المراجعة...</h2>
        </div>
    </div>

    <div id="setupProfileScreen" class="fixed inset-0 bg-primary z-40 hidden flex items-center justify-center">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl w-full max-w-md">
            <form id="setupProfileForm" class="space-y-4">
                <input type="text" id="setupName" placeholder="الاسم الكامل" required class="w-full border p-2 rounded">
                <select id="setupRole" class="w-full border p-2 rounded">
                    <option value="Technical Engineer">Technical Engineer</option>
                    <option value="accountant">Accountant</option>
                </select>
                <button type="submit" class="w-full bg-secondary text-white p-3 rounded font-bold">إرسال</button>
            </form>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-screen w-full relative">
        <header class="bg-white dark:bg-gray-800 p-4 border-b flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <button onclick="window.toggleSidebar()" class="md:hidden text-xl"><i class="fa-solid fa-bars"></i></button>
                <img id="userAvatar" src="" class="w-10 h-10 rounded-full border-2 border-secondary">
                <div class="text-right">
                    <p id="userName" class="text-sm font-bold"></p>
                    <p id="userRole" class="text-xs text-secondary"></p>
                </div>
            </div>
            <button id="backToHomeBtn" onclick="window.location.hash='home-grid'" class="hidden bg-secondary text-white px-4 py-2 rounded-lg text-sm">خروج للرئيسية</button>
            <h2 id="page-title" class="font-bold">نظام Quill</h2>
        </header>

        <main class="flex-1 overflow-y-auto p-4">
            <section id="home-grid" class="section-content grid grid-cols-2 md:grid-cols-4 gap-4 max-w-6xl mx-auto pt-10">
                <div onclick="window.location.hash='tasks'" class="app-card"><i class="fa-solid fa-list-check text-2xl mb-2 text-emerald-500"></i><span>المهام</span></div>
                <div onclick="window.location.hash='chat'" class="app-card"><i class="fa-solid fa-comments text-2xl mb-2 text-orange-500"></i><span>المناقشة</span></div>
                <div onclick="window.location.hash='crm-management'" class="app-card"><i class="fa-solid fa-user-tie text-2xl mb-2 text-blue-500"></i><span>العملاء</span></div>
                <div onclick="window.location.hash='attendance'" class="app-card"><i class="fa-solid fa-clock text-2xl mb-2 text-indigo-500"></i><span>الحضور</span></div>
            </section>

            <section id="tasks" class="section-content hidden">
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold">قائمة المهام</h3>
                        <button onclick="window.openModal('taskModal')" class="bg-green-500 text-white px-4 py-2 rounded">إضافة مهمة</button>
                    </div>
                    <table class="w-full text-right"><tbody id="tasksListBody"></tbody></table>
                    <div id="emptyTasksMessage" class="text-center py-10 hidden">لا توجد مهام</div>
                </div>
            </section>
            
            <section id="chat" class="section-content hidden h-full flex flex-col">
                <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
                <form id="chatForm" class="p-4 bg-white dark:bg-gray-800 border-t flex gap-2">
                    <input type="text" id="chatInput" class="flex-1 border p-2 rounded-lg outline-none" placeholder="اكتب هنا...">
                    <button type="submit" class="bg-secondary text-white px-6 rounded-lg"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </section>

            </main>
    </div>

    <div id="taskModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl w-full max-w-md">
            <h3 class="font-bold mb-4">إنشاء مهمة جديدة</h3>
            <form id="addTaskForm" class="space-y-4">
                <input type="text" id="taskTitle" placeholder="عنوان المهمة" required class="w-full border p-2 rounded">
                <textarea id="taskDesc" placeholder="تفاصيل..." class="w-full border p-2 rounded"></textarea>
                <select id="taskAssignee" class="w-full border p-2 rounded"></select>
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="window.closeModal('taskModal')" class="p-2">إلغاء</button>
                    <button type="submit" class="bg-primary text-white px-4 py-2 rounded">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-6 left-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="ui.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module" src="chat.js"></script>
    <script type="module" src="crm.js"></script>
    <script type="module" src="tasks.js"></script>
    <script type="module" src="robots.js"></script>
    <script type="module" src="hr.js"></script>
    <script type="module" src="operations.js"></script>

    <script>
        // كود الطوارئ لإخفاء الشاشة إذا تأخر التحميل
        setTimeout(() => {
            const loader = document.getElementById('loadingScreen');
            if(loader) loader.classList.add('hidden');
        }, 3000);
    </script>
</body>
</html>
