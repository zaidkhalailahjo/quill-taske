<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quill World System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#002d74', secondary: '#00839b' }, fontFamily: { sans: ['Cairo', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 h-screen overflow-hidden flex relative transition-colors duration-300">

    <div id="loadingScreen" class="fixed inset-0 bg-white dark:bg-gray-900 z-[100] flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-primary font-bold">جاري تحميل نظام Quill...</p>
    </div>

    <div id="systemPasswordScreen" class="fixed inset-0 bg-primary z-[90] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <h2 class="text-2xl font-bold mb-4">رمز الدخول للنظام</h2>
            <input type="password" id="sysPasswordInput" class="w-full border p-3 rounded-lg mb-4 text-center dark:bg-gray-700" placeholder="كلمة السر">
            <button onclick="window.checkSystemPassword()" class="w-full bg-secondary text-white py-3 rounded-lg font-bold">دخول</button>
            <p id="sysPassError" class="text-red-500 mt-2 hidden">الرمز غير صحيح</p>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 bg-primary z-[80] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-xl text-center shadow-2xl">
            <h2 class="text-xl font-bold mb-8">مرحباً بك في Quill</h2>
            <button id="googleLoginBtn" class="flex items-center gap-3 bg-white border p-3 rounded-lg text-gray-700 font-bold shadow-sm">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6"> تسجيل الدخول بجوجل
            </button>
        </div>
    </div>

    <div id="setupProfileScreen" class="fixed inset-0 bg-primary z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-center">إكمال الملف الشخصي</h2>
            <form id="setupProfileForm" class="space-y-4">
                <input type="text" id="setupName" required placeholder="الاسم الكامل" class="w-full border p-2 rounded dark:bg-gray-700">
                <select id="setupRole" required class="w-full border p-2 rounded dark:bg-gray-700">
                    <option value="" disabled selected>-- اختر وظيفتك --</option>
                    <option value="Technical Engineer">Technical Engineer</option>
                    <option value="accountant">Accountant</option>
                    <option value="technical team supervisor">Technical Team Supervisor</option>
                </select>
                <button type="submit" class="w-full bg-secondary text-white p-3 rounded-lg font-bold">حفظ والدخول</button>
            </form>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-screen w-full relative">
        <header class="bg-white dark:bg-gray-800 p-4 border-b flex justify-between items-center z-10 shadow-sm">
            <div class="flex items-center gap-3">
                <button onclick="window.toggleSidebar()" class="md:hidden text-xl"><i class="fa-solid fa-bars"></i></button>
                <img id="userAvatar" src="" class="w-10 h-10 rounded-full border-2 border-secondary object-cover">
                <div class="hidden sm:block text-right">
                    <p id="userName" class="text-sm font-bold"></p>
                    <p id="userRole" class="text-[10px] text-secondary font-bold"></p>
                </div>
            </div>
            <h2 id="page-title" class="font-bold text-primary">الرئيسية</h2>
            <img src="https://quill.world/wp-content/uploads/2022/01/New-Project-9-1-1.png" class="h-8">
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside id="sidebar" class="fixed md:relative inset-y-0 right-0 transform translate-x-full md:translate-x-0 transition duration-300 w-64 bg-primary dark:bg-gray-800 text-white flex flex-col z-30 shadow-xl">
                <nav class="flex-1 mt-6 px-4 space-y-2 overflow-y-auto">
                    <button onclick="window.location.hash='home-grid'" class="nav-btn w-full flex items-center py-3 px-4 rounded-lg bg-secondary"><i class="fa-solid fa-house ml-3"></i>الرئيسية</button>
                    <button onclick="window.location.hash='tasks'" class="nav-btn w-full flex items-center py-3 px-4 rounded-lg hover:bg-white/10"><i class="fa-solid fa-list-check ml-3"></i>المهام</button>
                    <button onclick="window.location.hash='chat'" class="nav-btn w-full flex items-center py-3 px-4 rounded-lg hover:bg-white/10"><i class="fa-solid fa-comments ml-3"></i>المناقشة</button>
                    <button onclick="window.location.hash='attendance'" class="nav-btn w-full flex items-center py-3 px-4 rounded-lg hover:bg-white/10"><i class="fa-solid fa-clock ml-3"></i>الحضور</button>
                </nav>
            </aside>

            <main class="flex-1 overflow-y-auto p-4 md:p-6 bg-gray-50 dark:bg-gray-900" id="mainScrollArea">
                <section id="home-grid" class="section-content grid grid-cols-2 md:grid-cols-4 gap-4 max-w-6xl mx-auto">
                    <div onclick="window.location.hash='tasks'" class="app-card"><i class="fa-solid fa-list-check text-2xl mb-2 text-emerald-500"></i><span>المهام</span></div>
                    <div onclick="window.location.hash='chat'" class="app-card"><i class="fa-solid fa-comments text-2xl mb-2 text-orange-500"></i><span>المناقشة</span></div>
                    <div onclick="window.location.hash='attendance'" class="app-card"><i class="fa-solid fa-clock text-2xl mb-2 text-indigo-500"></i><span>الحضور</span></div>
                </section>

                <section id="tasks" class="section-content hidden">
                    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold">قائمة المهام</h3>
                            <button onclick="window.openModal('taskModal')" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold">إضافة مهمة</button>
                        </div>
                        <table class="w-full text-right"><tbody id="tasksListBody"></tbody></table>
                    </div>
                </section>

                <section id="chat" class="section-content hidden h-full flex flex-col">
                    <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 chat-bg"></div>
                    <form id="chatForm" class="p-3 border-t dark:border-gray-700 flex gap-2">
                        <input type="text" id="chatInput" class="flex-1 border dark:bg-gray-700 p-3 rounded-xl outline-none" placeholder="اكتب هنا...">
                        <button type="submit" class="bg-secondary text-white px-6 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
                    </form>
                </section>
            </main>
        </div>
    </div>

    <div id="taskModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl w-full max-w-md">
            <h3 class="font-bold mb-4 text-lg">إنشاء مهمة جديدة</h3>
            <form id="addTaskForm" class="space-y-4">
                <input type="text" id="taskTitle" required placeholder="عنوان المهمة" class="w-full border p-2 rounded dark:bg-gray-700">
                <textarea id="taskDesc" placeholder="تفاصيل..." class="w-full border p-2 rounded dark:bg-gray-700 h-24"></textarea>
                <select id="taskAssignee" class="w-full border p-2 rounded dark:bg-gray-700 font-bold"></select>
                <div class="flex justify-end gap-2 pt-4">
                    <button type="button" onclick="window.closeModal('taskModal')" class="px-4 py-2 text-gray-500">إلغاء</button>
                    <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg font-bold">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-6 left-6 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/ui-logic.js"></script>
    <script type="module" src="./js/auth-logic.js"></script>
    <script type="module" src="./js/tasks-logic.js"></script>
    <script type="module" src="./js/chat-logic.js"></script>
    <script type="module" src="./js/app-core.js"></script>

    <div id="mobileOverlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden" onclick="window.toggleSidebar()"></div>
</body>
</html>
