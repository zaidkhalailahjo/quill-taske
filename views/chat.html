<div class="flex h-[calc(100vh-80px)] md:h-full bg-white dark:bg-gray-800 md:rounded-xl shadow-sm border-x border-b border-gray-200 dark:border-gray-700 overflow-hidden relative animate-fade-in">
    <div class="w-64 bg-gray-50 dark:bg-gray-900 border-l border-gray-200 dark:border-gray-700 flex-col hidden md:flex flex-shrink-0 z-10">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-white dark:bg-gray-800 h-[68px]">
            <span class="font-bold text-gray-700 dark:text-gray-200 text-sm"><i class="fa-solid fa-list-ul mx-2 text-gray-400"></i> القنوات والمجموعات</span>
            <button id="innerCreateGroupBtn" onclick="window.openCreateGroupModal()" class="text-gray-400 hover:text-primary transition" title="إنشاء مجموعة جديدة">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        <div class="p-2 overflow-y-auto flex-1 space-y-1" id="innerChatSidebarList"></div>
    </div>

    <div class="flex-1 flex flex-col min-w-0 bg-white dark:bg-gray-800 relative">
        <div class="bg-white dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700 p-3 md:p-4 flex flex-col md:flex-row justify-between md:items-center z-10 shadow-sm min-h-[68px] gap-3">
            <div class="flex items-center gap-3">
                <button onclick="window.toggleSidebar()" class="md:hidden text-gray-500 hover:text-primary"><i class="fa-solid fa-bars text-xl"></i></button>
                <div class="bg-secondary text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl flex-shrink-0 shadow-inner"><i class="fa-solid fa-comments"></i></div>
                <div class="flex flex-col cursor-pointer hover:bg-gray-50 p-1 rounded" onclick="window.openGroupInfoModal()">
                    <h3 id="chatHeaderTitle" class="font-bold text-primary text-sm md:text-base">الدردشة العامة</h3>
                    <p id="chatHeaderDesc" class="text-[10px] text-gray-400">يتواجد هنا جميع أعضاء مساحة العمل</p>
                </div>
            </div>
            </div>

        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 chat-bg relative"></div>

        <div class="p-3 bg-white dark:bg-gray-800 border-t border-gray-100 flex-shrink-0 relative z-10">
            <form id="chatForm" class="flex items-center bg-gray-50 border border-gray-200 rounded-2xl pr-4 pl-1 py-1 w-full relative shadow-sm">
                <button type="button" onclick="document.getElementById('chatFileInput').click()" class="text-gray-400 hover:text-secondary text-lg mx-2 mb-2 self-end"><i class="fa-solid fa-paperclip"></i></button>
                <textarea id="chatInput" rows="1" placeholder="اكتب رسالتك..." class="flex-1 bg-transparent border-none focus:outline-none text-sm py-3 px-2 resize-none min-h-[44px]"></textarea>
                <button type="submit" class="bg-secondary text-white w-10 h-10 rounded-full flex items-center justify-center transition-colors mx-2 shadow self-end mb-1"><i class="fa-regular fa-paper-plane transform -scale-x-100"></i></button>
            </form>
        </div>
    </div>
</div>
