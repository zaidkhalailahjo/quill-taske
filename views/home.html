<div class="animate-fade-in p-4 md:p-10 max-w-6xl mx-auto w-full">
    <div id="attendanceLockBanner" class="bg-red-500 text-white p-4 rounded-xl mb-6 text-center font-bold shadow-md hidden flex-col items-center justify-center gap-3">
        <div>
            <i class="fa-solid fa-lock text-2xl mb-2 block"></i>
            <span>النظام مقفل. يجب تسجيل الدخول (الحضور) أولاً لفتح التطبيقات.</span>
        </div>
        <button onclick="window.punchIn()" class="bg-white text-red-600 hover:bg-gray-100 px-6 py-2 rounded-lg font-bold transition shadow-sm w-max mx-auto">
            <i class="fa-solid fa-right-to-bracket mx-1"></i> تسجيل الدخول الآن
        </button>
    </div>

    <div class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
        <div class="text-right">
            <h2 class="text-3xl font-bold text-gray-800 dark:text-white" data-i18n="التطبيقات">التطبيقات</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-2" data-i18n="اختر التطبيق الذي تود العمل عليه">اختر التطبيق الذي تود العمل عليه</p>
        </div>
        <div id="homePunchOutContainer" class="hidden w-full md:w-auto flex flex-col gap-2">
            <div id="ceoExportSection" class="hidden">
                <button onclick="window.openModal('exportModal')" class="w-full bg-primary hover:bg-secondary text-white px-5 py-2.5 rounded-xl transition-colors font-bold shadow-md flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-export"></i> سحب تفاصيل النظام
                </button>
            </div>
            <button onclick="window.punchOutFromMain()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-person-walking-arrow-right"></i> تسجيل الانصراف (إنهاء الدوام)
            </button>
        </div>
    </div>
    
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="homeGridContainer">
        
        <div onclick="window.location.hash='tasks'" class="app-card hover:border-emerald-200 group relative">
            <div class="app-icon-container bg-emerald-50 text-emerald-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-list-check"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="المهام">المهام</span>
            <span id="gridTasksBadge" class="absolute top-4 left-4 hidden bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md"></span>
        </div>

        <div onclick="window.location.hash='crm'" class="app-card hover:border-lime-200 group">
            <div class="app-icon-container bg-lime-50 text-lime-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-address-book"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="العملاء">العملاء</span>
        </div>

        <div id="grid-notices" onclick="window.location.hash='notices'" class="app-card hover:border-yellow-200 group relative">
            <div class="app-icon-container bg-yellow-50 text-yellow-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-bullhorn"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="التعميمات">التعميمات</span>
            <span id="gridNoticesBadge" class="absolute top-4 left-4 hidden bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md"></span>
        </div>

        <div onclick="window.location.hash='chat'" class="app-card hover:border-orange-200 group relative">
            <div class="app-icon-container bg-orange-50 text-orange-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-comments"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="المناقشة">المناقشة</span>
            <span id="homeChatBadge" class="absolute top-4 left-4 hidden bg-blue-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md"></span>
            <span class="external-chat-badge absolute top-4 right-4 hidden bg-blue-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md"></span>
        </div>
        
        <div onclick="window.location.hash='my-profile'" class="app-card hover:border-sky-200 group profile-dynamic-card">
            <div class="app-icon-container bg-sky-50 text-sky-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-id-card"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200 profile-dynamic-text">ملفي والعهد</span>
        </div>

        <div onclick="window.location.hash='attendance'" class="app-card hover:border-indigo-200 group cursor-pointer">
            <div class="app-icon-container bg-indigo-50 text-indigo-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-user-clock"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="الحضور والانصراف">الحضور والانصراف</span>
        </div>

        <a href="https://tasks.farah-snacks.store/#leaves" class="app-card hover:border-pink-200 group relative">
            <div class="app-icon-container bg-pink-50 text-pink-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-plane-departure"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="الإجازات">الإجازات <i class="fa-solid fa-external-link-alt text-xs ml-1"></i></span>
            <span id="gridLeavesBadge" class="absolute top-4 left-4 hidden bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md"></span>
        </a>

        <a href="https://tasks.farah-snacks.store/#drive" class="app-card hover:border-cyan-200 group">
            <div class="app-icon-container bg-cyan-50 text-cyan-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-folder-open"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="المستندات">المستندات <i class="fa-solid fa-external-link-alt text-xs ml-1"></i></span>
        </a>

        <a href="https://tasks.farah-snacks.store/#meetings" class="app-card hover:border-blue-200 group relative">
            <div class="app-icon-container bg-blue-50 text-blue-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-video"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="الاجتماعات">الاجتماعات <i class="fa-solid fa-external-link-alt text-xs ml-1"></i></span>
            <span id="gridMeetingsBadge" class="absolute top-4 left-4 hidden bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md"></span>
        </a>
        
        <a href="https://tasks.farah-snacks.store/#trainees" class="app-card hover:border-amber-200 group relative">
            <div class="app-icon-container bg-amber-50 text-amber-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200">المتدربين <i class="fa-solid fa-external-link-alt text-xs ml-1"></i></span>
        </a>
        
        <a id="grid-expenses-ext" href="https://tasks.farah-snacks.store/#expenses" class="hidden app-card hover:border-teal-200 group relative">
            <div class="app-icon-container bg-teal-50 text-teal-600 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-file-invoice-dollar"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200">المصاريف والنثريات <i class="fa-solid fa-external-link-alt text-xs ml-1"></i></span>
        </a>

        <div id="grid-employees" onclick="window.location.hash='employees'" class="app-card hover:border-purple-200 group hidden">
            <div class="app-icon-container bg-purple-50 text-purple-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-users"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="الموظفون">الموظفون</span>
        </div>

        <div id="grid-dashboard" onclick="window.location.hash='dashboard'" class="app-card hover:border-fuchsia-200 group hidden">
            <div class="app-icon-container bg-fuchsia-50 text-fuchsia-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-chart-pie"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="لوحات البيانات">لوحات البيانات</span>
        </div>

        <div id="grid-logs" onclick="window.location.hash='logs'" class="app-card hover:border-red-200 group hidden">
            <div class="app-icon-container bg-red-50 text-red-500 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </div>
            <span class="font-bold text-gray-800 dark:text-gray-200" data-i18n="سجل النظام">سجل النظام</span>
        </div>

    </div>
</div>
